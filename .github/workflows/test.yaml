name: Python CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
      
    - name: Install dependencies
      run: | 
       pip install flask
       pip install pytest
       pip install mysql-connector-python  
       pip install passlib   
       pip install scikit-learn   
       pip install nltk   
       pip install mysql 
       pip install mysql-connector-python   
       pip install pandas   
       pip install -e . 
     
    - name: Run tests
      run: PYTHONPATH=src pytest -v

