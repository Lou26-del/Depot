<!doctype html>
<html lang="en">

<head>
    <title>Inscription</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <link rel="stylesheet" href="{{url_for('static', filename='css/font-awesome.min.css') }}">
    <link rel="stylesheet" href="{{url_for('static', filename='css/style.css') }}">
     <link rel="stylesheet" href="{{ url_for('static', filename='css/notification.css') }}">

</head>

<body>
    <section class="ftco-section">
        <div class="container">

            <div class="row justify-content-center">
                <div class="col-md-7 col-lg-6 col-xl-5">
                    <div class="login-wrap p-4 p-md-5">
                        <div class="icon d-flex align-items-center justify-content-center">
                            <span class="fa fa-edit"></span>
                        </div>
                        <h3 class="text-center mb-4" style="font-family: 'Poppins', sans-serif; color:black;">
                            Inscription</h3>
                        <form action="/compte" class="signup-form" method="post">
                            <div class="form-group mb-3">
                                <label class="label" for="nom"
                                    style="color:black; font-family: 'Poppins', sans-serif; ">Nom</label>
                                <input type="text" class="form-control" placeholder="Doe" name="nom" id="nom" required>
                            </div>
                            <div class="form-group mb-3">
                                <label class="label" for="pre"
                                    style="color:black;font-family: 'Poppins', sans-serif; ">Prenom</label>
                                <input type="text" class="form-control" placeholder="John" name="pre" id="pre" required>
                            </div>
                            <div class="form-group mb-3">
                                <label class="label" for="mail"
                                    style="color:black;font-family: 'Poppins', sans-serif; ">Email</label>
                                <input type="text" class="form-control" placeholder="john.doe@gmail.com" name="mail" id="mail">
                            </div>
                            <div class="form-group mb-3">
                                <label class="label" for="pass"
                                    style="color:black;font-family: 'Poppins', sans-serif; ">Mot de Passe</label>
                                <input id="password-field" type="password" class="form-control" placeholder="mot de passe"
                                    name="pass">
                                <span toggle="#password-field"
                                    class="fa fa-fw fa-eye field-icon toggle-password"></span>
                            </div>

                            <div class="form-group">
                                <button type="submit"
                                    class="form-control btn btn-primary rounded submit px-3">Enregistrer</button>
                            </div>
                             <div class="form-group">
                                <button type="button" onclick="window.location.href='/login'"
                                    class="form-control btn btn-primary rounded submit px-3">Annuler</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>


     <!-- Notification Container -->
    <div id="notificationContainer" class="notification-container">
       <!-- <div class="notification-icon"></div>-->
        <i id="notificationIcon" class="notification-icon"></i>
        <div class="notification-message"></div>
    </div>


    <script src="{{url_for('static', filename='js/jquery.min.js') }}"></script>
    <script src="{{url_for('static', filename='js/popper.js') }}"></script>
    <script src="{{url_for('static', filename='js/bootstrap.min.js') }}"></script>
    <script src="{{url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/notification.js') }}"></script>
    <script src="{{ url_for('static', filename='js/mail.js') }}"></script>



    <script>
        document.addEventListener("DOMContentLoaded", function () {
            {% if notif_message %}
            showNotification("{{ notif_message|escape }}", "{{ notif_type|escape }}");
            {% endif %}
        });
    </script>

</body>

</html>
