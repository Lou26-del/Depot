<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audit des activités - TrustMail</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Orbitron:wght@400;600&display=swap"
    rel="stylesheet">

  <!-- Lien vers le fichier CSS commun -->
  <link href="{{ url_for('static', filename='css/dashboard.css') }}" rel="stylesheet">
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a href="{{ url_for('dashboard') }}" class="text-white fs-4 fw-bold"
        style="font-family: 'Orbitron', sans-serif; text-shadow: 0 0 8px #ffffff !important; text-decoration: none;">
        TrustMail
      </a>
      <div class="d-flex ms-auto me-3">
        <a class="shiny-white-button me-2" href="/about">À propos</a>
        <a class="shiny-white-button me-2" href="/logs">Logs</a>
        <a class="shiny-white-button me-2" href="/logout">Déconnexion</a>
      </div>
      <span class="text-white fs-4 fw-bold" style="font-family: 'Orbitron', sans-serif;">
        <i class="bi bi-person-circle" style="font-size: 2.5rem; color: #a0d2eb;"></i>
      </span>
    </div>
  </nav>

  <!-- Contenu principal -->
  <main>
    <div class="container mt-5">
      <h1 class="display-5 mb-4 text-center" style="font-family: 'Orbitron', sans-serif;">Audit des activités</h1>

      <div class="table-responsive shadow-lg p-3 bg-white rounded">
        <table class="table table-striped table-hover align-middle">
          <thead class="table-dark">
            <tr>

              <th scope="col">Utilisateur</th>
              <th scope="col">Sujet</th>
              <th scope="col">Résultat</th>
            </tr>
          </thead>
          <tbody id="logsTableBody">
            {% for sujet, loginU, resultat in logs %}
            <tr>
              <td>{{ loginU }}</td>
              <td>{{ sujet }}</td>
              <td>{{ resultat }}</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Bootstrap JS -->
  <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>

  <!-- Script pour remplir dynamiquement le tableau -->
  <script>
    // Exemple de données fictives (à remplacer par un fetch AJAX ou Jinja)
    const logs = [
      // {id: 1, utilisateur: "john.doe@gmail.com", sujet: "Test", corps: "Message...", urls: "http://exemple.com", resultat: "phishing", date: "2026-03-24"}
    ];

    const tbody = document.getElementById("logsTableBody");
    logs.forEach(log => {
      const row = document.createElement("tr");
      row.innerHTML = `  
        <td>${log.utilisateur}</td>
        <td>${log.sujet}</td>
        <td>${log.resultat}</td>
      `;
      tbody.appendChild(row);
    });
  </script>
</body>

</html>
