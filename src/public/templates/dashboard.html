<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tableau de bord</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Orbitron:wght@400;600&display=swap"
    rel="stylesheet">

  <link href="{{url_for('static', filename='css/dashboard.css') }}" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard_notif.css') }}">

</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <!--<img src="{{url_for('static', filename='assets/logo_2.png') }}" alt="TrustMail Logo" class="logo-shiny">-->
      <span class="text-white fs-4 fw-bold"
        style="font-family: 'Orbitron', sans-serif;  text-shadow: 0 0 8px #ffffff !important;">TrustMail</span>
      <div class="d-flex ms-auto me-3">
        <a class="shiny-white-button  me-2" id="deconnexionBtn" href="/about">
          à propos
        </a>
        <a class="shiny-white-button me-2" href="/logout">
          deconnexion
        </a>
      </div>
      <span class="text-white fs-4 fw-bold" style="font-family: 'Orbitron', sans-serif;">
        <i class="bi bi-person-circle" style="font-size: 2.5rem; color: #a0d2eb;"></i>
      </span>

    </div>
  </nav>

  <!-- Contenu principal -->
  <main>
    <div class="container">
      <h1 class="display-4 mb-5">Analyse de Fichiers</h1>
      <div class="d-flex justify-content-center align-items-center flex-wrap">
        <!-- Champ input fichier avec icône intégrée -->
        <form action="/upload" method="post" enctype="multipart/form-data">
          <div class="custom-input mb-3 mb-md-0 d-flex align-items-center gap-3">
            <!-- Input fichier caché -->
            <!--<input id="fileInput" type="file" name="file" accept=".eml" hidden required>-->
            <input type="file" name="file" value="1">

            <!-- Label stylisé avec icône + texte -->
            <!-- <label for="fileInput" class="form-control d-flex align-items-center">
              <i class="bi bi-paperclip"></i>
              <span class="text-truncate">Importer un fichier...</span>
            </label> -->
            <!-- Bouton analyser -->
            <button type="submit" class="btn-analyser" id="analyserBtn">
              <i class="bi bi-shield-check me-2"></i>Analyser
            </button>
          </div>
        </form>
      </div>
      <div id="resultBox" class="result-box shadow-lg"></div>
    </div>
  </main>

  <!-- Notification Container -->
  <div id="notificationContainer" class="notification-container">
    <i id="notificationIcon" class="notification-icon"></i>
    <div class="notification-message"></div>
  </div>
  <!-- Bootstrap JS -->
  <script src="{{url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
  <script src="{{url_for('static', filename='js/dashboard.js') }}"></script>
  <script src="{{url_for('static', filename='js/menu.js') }}"></script>
  <script src="{{ url_for('static', filename='js/dashboard_notif.js') }}"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      console.log("notif_message:", "{{ notif_message }}"); // DEBUG
      console.log("notif_type:", "{{ notif_type }}");       // DEBUG
      {% if notif_message %}
      showNotification("{{ notif_message|escape }}", "{{ notif_type|escape }}");
      {% endif %}
    });


  </script>

</body>

</html>
